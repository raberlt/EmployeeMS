version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install

  build:
    commands:  
      - npm run build

  post_build:
    commands:
      - aws s3 sync build/ s3://linene-employeems --delete 
      - aws cloudfront create-invalidation --distribution-id E14M4VNRB370T --paths "/*" 